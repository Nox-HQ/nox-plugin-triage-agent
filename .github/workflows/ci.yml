name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Remove local replace
        run: sed -i '/^replace /d' go.mod && go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          only-new-issues: true

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Remove local replace
        run: sed -i '/^replace /d' go.mod && go mod tidy

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -v ./...

      - name: Build binary
        run: make build

  nox-scan:
    name: Nox Self-Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Nox
        uses: nox-hq/nox@7c7eefe4ec928d78e6b7c6ae5edf5d9a6afa4fdd # v1.13.1
        with:
          path: .
          format: sarif,json
          output: nox-results
          fail-on-findings: 'false'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@33119e582d3ab4ed79c2610af108cb08ff983917 # v3
        if: always()
        with:
          sarif_file: nox-results/results.sarif
        continue-on-error: true

      - name: Upload scan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: nox-results
          path: nox-results/
          if-no-files-found: warn

  nox-pr-gate:
    name: Nox PR Gate (high/critical)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Nox (changed files only)
        uses: nox-hq/nox@7c7eefe4ec928d78e6b7c6ae5edf5d9a6afa4fdd # v1.13.1
        with:
          path: .
          format: sarif,json
          output: nox-pr
          fail-on-findings: 'true'
          severity-threshold: high
          changed-since: origin/${{ github.base_ref }}

      - name: Upload SARIF (PR-scoped)
        uses: github/codeql-action/upload-sarif@33119e582d3ab4ed79c2610af108cb08ff983917 # v3
        if: always()
        with:
          sarif_file: nox-pr/results.sarif
          category: nox-pr
        continue-on-error: true
