name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write   # required for cosign keyless signing
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install Cosign
        # cosign v4: signs config uses the new --bundle (.sigstore.json)
        # format; --output-signature/--output-certificate were removed.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft (for SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate registry entry
        # Best-effort. The `nox plugin entry` subcommand requires nox
        # >= 0.8.0 (added 2026-05). Older nox releases on PATH cause
        # this step to exit non-zero — that's fine, the actual
        # GoReleaser release + Cosign signing already succeeded above.
        continue-on-error: true
        run: |
          set -euo pipefail
          # Pull a release-built nox binary so we can run `plugin entry`.
          curl -sSL "https://github.com/nox-hq/nox/releases/latest/download/nox_$(curl -sSL https://api.github.com/repos/nox-hq/nox/releases/latest | jq -r .tag_name | sed 's/^v//')_linux_amd64.tar.gz" -o nox.tar.gz
          tar xzf nox.tar.gz
          ./nox plugin entry --dir . --release "${GITHUB_REF_NAME#v}" --output entry.json
          echo "::notice file=entry.json::Open a PR against nox-hq/nox to add this entry to registry-scaffold/index.json"

      - name: Upload registry entry artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-entry
          path: entry.json
          retention-days: 30
