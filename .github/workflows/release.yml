name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write   # required for cosign keyless signing
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Cosign
        # Pinned to v3.10.x — cosign v4 changed bundle format and
        # broke goreleaser's --output-signature flag. Move to v4
        # once goreleaser ships compatible signing config.
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Install Syft (for SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate registry entry
        # Best-effort. The `nox plugin entry` subcommand requires nox
        # >= 0.8.0 (added 2026-05). Older nox releases on PATH cause
        # this step to exit non-zero — that's fine, the actual
        # GoReleaser release + Cosign signing already succeeded above.
        continue-on-error: true
        run: |
          set -euo pipefail
          # Pull a release-built nox binary so we can run `plugin entry`.
          curl -sSL "https://github.com/nox-hq/nox/releases/latest/download/nox_$(curl -sSL https://api.github.com/repos/nox-hq/nox/releases/latest | jq -r .tag_name | sed 's/^v//')_linux_amd64.tar.gz" -o nox.tar.gz
          tar xzf nox.tar.gz
          ./nox plugin entry --dir . --release "${GITHUB_REF_NAME#v}" --output entry.json
          echo "::notice file=entry.json::Open a PR against nox-hq/nox to add this entry to registry-scaffold/index.json"

      - name: Upload registry entry artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: registry-entry
          path: entry.json
          retention-days: 30
