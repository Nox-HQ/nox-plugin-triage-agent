# Shared GoReleaser template for nox plugins. Each plugin's repo
# copies this verbatim and parameterises only the project_name. The
# archive naming convention matches the URL pattern in the registry
# index, so a successful release auto-aligns with the marketplace
# entry produced by `nox plugin entry`.

version: 2

project_name: nox-plugin-triage-agent

before:
  hooks:
    # Strip replace directives first — plugin source uses local
    # `replace ../..` during development; standalone releases must
    # consume the published module. Order matters: sed runs before
    # any `go mod` command can resolve the missing path.
    - sh -c "sed -i.bak '/^replace /d' go.mod && rm -f go.mod.bak"
    - go mod tidy
    - go mod download
    - go test ./...

builds:
  - id: plugin
    binary: nox-plugin-triage-agent
    main: ./
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: plugin-archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - plugin.yaml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Cosign keyless signing of release artifacts. Bundle format
# (cosign v3.10+, required by cosign v4) is produced alongside the
# legacy --output-signature for backward compatibility with older
# verifiers in the wild.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request

release:
  draft: false
  prerelease: auto
  # GoReleaser auto-uploads ${signature} from the signs block but
  # doesn't know about the cosign bundle file. Attach it explicitly
  # so cosign v4 verifiers can fetch it from the release.
  extra_files:
    - glob: dist/*.sig.bundle
  footer: |
    ## Install

    Add to your registry:

    ```bash
    nox plugin install nox/triage-agent
    ```

    Or pin a specific version:

    ```bash
    nox plugin install nox/triage-agent@{{ .Version }}
    ```

    Verify the release artifacts:

    ```bash
    cosign verify-blob \
      --certificate-identity-regexp "https://github.com/nox-hq/nox-plugin-triage-agent/.github/workflows/release.yml@.*" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      --signature checksums.txt.sig \
      checksums.txt
    ```
